<!-- index.html의 리뷰 섹션 부분을 아래와 같이 비워두고 스크립트로 채웁니다 -->
<section class="py-32 bg-[#F9F8F6] px-6">
    <div class="max-w-7xl mx-auto">
        <div class="text-center mb-16">
            <h2 class="text-4xl font-serif mb-4">향기를 경험한 이들의 기록</h2>
            <p class="text-[#2D241E]/60">수많은 이들이 찾은 자신만의 고유한 실루엣</p>
        </div>
        <!-- 리뷰가 들어갈 컨테이너 -->
        <div id="reviews-container" class="grid md:grid-cols-3 gap-8">
            <!-- 자바스크립트가 여기에 리뷰를 생성합니다 -->
        </div>
    </div>
</section>

<script>
    // ... 기존 window.onload 코드 안의 이미지 매핑 아래에 추가 ...
    
    // 리뷰 렌더링 로직
    const reviewsContainer = document.getElementById('reviews-container');
    if (reviewsContainer && content.reviews) {
        reviewsContainer.innerHTML = ''; // 초기화
        content.reviews.forEach(review => {
            const stars = Array(Number(review.rating || 5)).fill('<i data-lucide="star" class="w-4 h-4 fill-current"></i>').join('');
            const reviewHtml = `
                <div class="bg-white p-8 rounded-xl shadow-sm border border-[#E8E2DA]/50 fade-in">
                    <div class="flex mb-4 text-[#9A8B7E]">${stars}</div>
                    <p class="text-sm italic mb-6 leading-relaxed">"${review.reviewText}"</p>
                    <div class="flex items-center space-x-3">
                        <img src="${review.userImage || 'https://via.placeholder.com/100'}" class="w-10 h-10 rounded-full object-cover">
                        <div class="text-xs">
                            <p class="font-bold">${review.reviewerName}</p>
                            <p class="opacity-50">${review.productName}</p>
                        </div>
                    </div>
                </div>
            `;
            reviewsContainer.innerHTML += reviewHtml;
        });
    }
    // ... 루사이드 아이콘 생성 코드 ...
</script>
