backend:
  name: github
  repo: tnsk6333-dev/reflect-scentlab
  branch: main
  base_url: https://reflect-auth.tnsk6333.workers.dev
  auth_endpoint: /auth

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "settings"
    label: "사이트 설정"
    delete: false
    editor:
      preview: false
    files:
      - name: "content"
        label: "메인 콘텐츠 및 리뷰 관리"
        file: "data/content.json"
        fields:
          - { label: "사이트 이름", name: "siteName", widget: "string" }
          - { label: "브랜드 컬러", name: "themeColor", widget: "color" }
          - { label: "인스타그램 ID", name: "instaId", widget: "string" }
          - { label: "구글 시트 URL", name: "sheetUrl", widget: "string" }
          - { label: "메인 히어로 이미지", name: "heroImage", widget: "image" }
          - { label: "조향의 철학 이미지", name: "philosophyImage", widget: "image" }
          - { label: "시그니처 퍼퓸 이미지", name: "signatureImage", widget: "image" }
          - { label: "롤온 오일 이미지", name: "rollonImage", widget: "image" }
          - { label: "아로마 에센스 이미지", name: "essenceImage", widget: "image" }
          - { label: "인스타그램 이미지 1", name: "instaImage1", widget: "image" }
          - { label: "인스타그램 이미지 2", name: "instaImage2", widget: "image" }
          - { label: "인스타그램 이미지 3", name: "instaImage3", widget: "image" }
          - { label: "인스타그램 이미지 4", name: "instaImage4", widget: "image" }
          - label: "고객 리뷰 목록"
            name: "reviews"
            widget: "list"
            summary: "{{fields.reviewerName}} - {{fields.productName}}"
            fields:
              - { label: "고객 성함", name: "reviewerName", widget: "string" }
              - { label: "리뷰 내용", name: "reviewText", widget: "text" }
              - { label: "구매 제품명", name: "productName", widget: "string" }
              - { label: "별점 (1-5)", name: "rating", widget: "number", default: 5, min: 1, max: 5 }
              - { label: "프로필 이미지", name: "userImage", widget: "image", required: false }
